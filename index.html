<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050518">
<title>Cosmic Combo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Audiowide&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050518;--panel:rgba(10,10,50,0.92);--border:rgba(80,160,255,0.3);
--cyan:#00e5ff;--pink:#ff3ec9;--gold:#ffcc00;--green:#39ff80;--red:#ff3355;--txt:#e8f2ff;--txt2:#8899bb;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;color:var(--txt);user-select:none;-webkit-user-select:none;touch-action:none;overscroll-behavior:none;-webkit-overflow-scrolling:touch;position:fixed;top:0;left:0}
#gc{width:100%;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
#sf{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{position:absolute;top:0;left:0;width:100%;height:100dvh;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.screen.active{display:flex}
.logo{font-family:'Audiowide',cursive;font-size:clamp(2rem,8vw,4.5rem);font-weight:400;background:linear-gradient(135deg,#ffdd00,#ff8800,#ff33cc,#00ddff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 30px rgba(255,140,0,0.6));letter-spacing:.05em;animation:lp 3s ease-in-out infinite}
@keyframes lp{0%,100%{filter:drop-shadow(0 0 25px rgba(255,140,0,0.5));transform:scale(1)}50%{filter:drop-shadow(0 0 50px rgba(255,140,0,0.8));transform:scale(1.02)}}
.sub{font-size:clamp(.75rem,2.5vw,1rem);color:var(--txt2);margin-bottom:1rem;letter-spacing:.25em;text-transform:uppercase;font-weight:600}
.btn{font-family:'Audiowide',cursive;font-weight:400;border:none;cursor:pointer;border-radius:14px;text-transform:uppercase;letter-spacing:.05em;transition:all .15s;-webkit-tap-highlight-color:transparent}
.bp{font-size:clamp(.9rem,3vw,1.2rem);padding:.85rem 2.5rem;background:linear-gradient(135deg,#ff8800,#ff33cc);color:#fff;box-shadow:0 0 30px rgba(255,68,204,0.4)}
.bp:active{transform:scale(.95)}
.bs{font-size:clamp(.75rem,2vw,.95rem);padding:.6rem 1.5rem;background:rgba(0,230,255,0.12);color:var(--cyan);border:1.5px solid rgba(0,230,255,0.4)}
.tbtns{display:flex;flex-direction:column;gap:.6rem;align-items:center}
.trow{display:flex;gap:.5rem}
.tstats{margin-top:.8rem;font-size:.75rem;color:var(--txt2);text-align:center;line-height:1.6}
.coin-display{font-family:'Audiowide',cursive;color:var(--gold);font-weight:700}
/* Map */
.lhdr{font-family:'Audiowide',cursive;font-size:clamp(1.2rem,3.5vw,1.8rem);font-weight:400;color:var(--cyan);margin-bottom:.1rem}
.lzone{font-size:.75rem;color:var(--pink);margin-bottom:.3rem;letter-spacing:.2em;text-transform:uppercase}
.map-wrap{width:min(94vw,440px);height:52dvh;position:relative;overflow:hidden;border-radius:14px;border:1px solid var(--border);background:rgba(5,5,25,0.6)}
#mapCanvas{width:100%;height:100%;display:block;touch-action:pan-y}
.lnav{display:flex;gap:.6rem;margin-top:.4rem;align-items:center}
.lpi{font-family:'Audiowide',cursive;font-size:.75rem;color:var(--txt2);min-width:80px;text-align:center}
.lbb{position:absolute;top:.6rem;left:.6rem;font-size:.7rem;padding:.35rem .7rem;z-index:12}
.lcoins{position:absolute;top:.6rem;right:.6rem;font-family:'Audiowide',cursive;font-size:.75rem;color:var(--gold);z-index:12}
/* HUD */
.hud{width:min(98vw,520px);display:flex;justify-content:space-between;align-items:stretch;padding:.15rem .1rem;margin-bottom:.1rem;z-index:5;gap:3px}
.hp{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:.2rem .4rem;flex:1;min-width:0}
.hl{font-family:'Rajdhani',sans-serif;font-size:.48rem;color:var(--txt2);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.hv{font-family:'Audiowide',cursive;font-size:clamp(.8rem,2.8vw,1.2rem);font-weight:400;color:var(--gold)}
.hli{text-align:center;flex:1.3}
.hln{font-family:'Audiowide',cursive;font-size:clamp(.55rem,1.8vw,.75rem);font-weight:400;color:var(--cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm{font-family:'Rajdhani',sans-serif;font-size:.65rem;color:var(--txt2);font-weight:600}
.hmc{color:var(--gold);font-weight:700;font-size:.85rem}
.boss-tag{display:inline-block;background:linear-gradient(135deg,#ff3355,#ff8800);color:#fff;font-size:.42rem;padding:1px 4px;border-radius:3px;margin-left:3px}
.obj-bar{width:min(98vw,520px);display:flex;align-items:center;gap:4px;margin-bottom:.08rem;font-family:'Audiowide',cursive;font-size:.55rem;color:var(--txt2);padding:0 .1rem}
.obj-icon{font-size:.85rem}.obj-text{color:var(--green);font-weight:700}
.obj-bar .coin-hud{margin-left:auto;color:var(--gold);font-size:.6rem}
.gbw{width:min(98vw,520px);height:6px;background:rgba(255,255,255,0.08);border-radius:3px;margin-bottom:.1rem;overflow:hidden}
.gbf{height:100%;background:linear-gradient(90deg,#00e5ff,#ff33cc);border-radius:3px;transition:width .4s;width:0%;box-shadow:0 0 6px rgba(0,229,255,0.3)}
.bw{position:relative;border-radius:12px;border:2px solid rgba(100,160,255,0.3);background:linear-gradient(180deg,rgba(20,10,65,0.85),rgba(8,4,35,0.92));padding:3px;box-shadow:0 0 50px rgba(80,0,200,0.15)}
#cv{display:block;border-radius:9px;touch-action:none}
#explCanvas{position:absolute;top:3px;left:3px;pointer-events:none;z-index:20;border-radius:9px}
.pub{width:min(98vw,520px);display:flex;justify-content:center;gap:clamp(.3rem,1.5vw,.6rem);margin-top:.2rem;padding:.1rem}
.pu{width:clamp(38px,10vw,48px);height:clamp(38px,10vw,48px);border-radius:50%;border:2px solid rgba(255,200,0,0.4);background:var(--panel);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,3vw,1.3rem);transition:all .15s;position:relative;-webkit-tap-highlight-color:transparent}
.pu.dis{opacity:.2;cursor:not-allowed}
.pu.act{border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.6);animation:puact .8s ease-in-out infinite}
@keyframes puact{0%,100%{box-shadow:0 0 20px rgba(255,215,0,0.6)}50%{box-shadow:0 0 35px rgba(255,215,0,0.9)}}
.puc{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-family:'Audiowide',cursive;font-size:.45rem;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.gbr{width:min(98vw,520px);display:flex;justify-content:space-between;align-items:center;margin-top:.1rem;padding:0 .1rem}
.bbg{font-size:.6rem;padding:.3rem .6rem;-webkit-tap-highlight-color:transparent}
/* Overlays */
.ov{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(3,3,20,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.ov.active{display:flex}
.ob{background:linear-gradient(135deg,rgba(15,10,50,0.96),rgba(25,8,45,0.96));border:1px solid var(--border);border-radius:16px;padding:1.2rem;text-align:center;max-width:340px;width:88vw;box-shadow:0 0 40px rgba(0,80,200,0.2);max-height:85dvh;overflow-y:auto}
.ot{font-family:'Audiowide',cursive;font-size:1.3rem;font-weight:400;margin-bottom:.3rem}
.ot.w{background:linear-gradient(135deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ot.l{color:var(--red)}
.os{font-family:'Audiowide',cursive;font-size:1rem;color:var(--gold);margin:.2rem 0}
.win-stars{font-size:1.6rem;margin:.2rem 0;letter-spacing:3px}
.win-coins{font-family:'Audiowide',cursive;font-size:.8rem;color:var(--gold);margin:.15rem 0}
.om{color:var(--txt2);font-size:.75rem;margin-bottom:.8rem;line-height:1.4}
.obt{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.obt .btn{font-size:.7rem;padding:.45rem 1rem}
.btn-share{background:linear-gradient(135deg,#00cc88,#00aadd);color:#fff;box-shadow:0 0 15px rgba(0,200,150,0.3)}
.btn-share:active{transform:scale(.95)}
.share-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:.5rem;margin:.4rem 0;font-size:.65rem;line-height:1.5;text-align:left;white-space:pre-line;font-family:'Rajdhani',sans-serif;color:var(--txt)}
.share-copied{font-size:.55rem;color:var(--green);margin-top:.2rem;min-height:.8rem}
/* Shop */
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:.8rem 0;width:min(90vw,340px)}
.shop-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:.4rem .3rem;text-align:center;cursor:pointer;transition:all .15s}
.shop-item:hover{border-color:var(--gold)}.shop-item.cant{opacity:.35;cursor:not-allowed}
.shop-icon{font-size:1.2rem}.shop-name{font-size:.5rem;color:var(--txt2);margin:.1rem 0}
.shop-price{font-family:'Audiowide',cursive;font-size:.55rem;color:var(--gold)}
/* Spin wheel */
.spin-area{margin:.6rem 0;text-align:center}
.spin-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:1.5rem;z-index:2;filter:drop-shadow(0 0 6px rgba(255,200,0,0.6))}
.spin-result{font-family:'Audiowide',cursive;font-size:1rem;color:var(--gold);min-height:1.4rem;margin:.4rem 0;text-shadow:0 0 10px rgba(255,200,0,0.4)}
/* Stats/Achievements */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:.5rem 0;text-align:left;width:min(90vw,340px)}
.stat-item{background:rgba(255,255,255,0.03);border-radius:6px;padding:.3rem .4rem}
.stat-label{font-size:.45rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-family:'Audiowide',cursive;font-size:.75rem;color:var(--cyan);font-weight:700}
.ach-grid{display:grid;grid-template-columns:1fr;gap:4px;margin:.4rem 0;width:min(90vw,340px);max-height:200px;overflow-y:auto}
.ach-item{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,0.03);border-radius:6px;padding:.3rem .4rem;font-size:.6rem}
.ach-item.locked{opacity:.35}
.ach-icon{font-size:1rem;min-width:24px;text-align:center}
.ach-name{color:var(--txt);font-weight:600;font-size:.6rem}
.ach-desc{color:var(--txt2);font-size:.48rem}
/* Theme indicator */
.theme-grid{display:flex;gap:6px;margin:.5rem 0;justify-content:center;flex-wrap:wrap}
.theme-btn{width:40px;height:40px;border-radius:8px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .15s}
.theme-btn.active{border-color:var(--gold);box-shadow:0 0 10px rgba(255,215,0,0.4)}
.theme-btn.locked{opacity:.3;cursor:not-allowed}
/* Streak */
.streak-bar{display:flex;gap:3px;margin:.3rem 0;justify-content:center}
.streak-day{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-family:'Audiowide',cursive}
.streak-day.claimed{background:rgba(57,255,128,0.15);border-color:var(--green);color:var(--green)}
.streak-day.today{border-color:var(--gold);box-shadow:0 0 8px rgba(255,204,0,0.3)}
/* Timer for time warp */
.timer-bar{width:min(98vw,520px);height:5px;background:rgba(255,50,50,0.15);border-radius:3px;margin-bottom:.1rem;overflow:hidden;display:none}
.timer-fill{height:100%;background:linear-gradient(90deg,#ff3355,#ffcc00);border-radius:3px;transition:width .1s;width:100%}
/* Hearts */
.hlv{display:flex;gap:2px}.ht{font-size:.7rem}.ht.f{color:var(--red)}.ht.e{color:rgba(255,68,102,0.12)}
.cp{position:fixed;pointer-events:none;font-family:'Audiowide',cursive;font-weight:400;font-size:1.2rem;z-index:50;animation:cfl 1s ease-out forwards;text-shadow:0 0 16px currentColor;white-space:pre-line;text-align:center}
@keyframes cfl{0%{opacity:1;transform:translateY(0) scale(.5)}30%{opacity:1;transform:translateY(-16px) scale(1.15)}100%{opacity:0;transform:translateY(-50px) scale(.8)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}
/* iPhone SE / small phones (375x667) */
@media(max-height:680px){
  .pub{margin-top:.08rem;gap:.2rem}.pu{width:34px;height:34px;font-size:.9rem}
  .hud{gap:2px;padding:.1rem .05rem;margin-bottom:.05rem}.hp{padding:.15rem .3rem;border-radius:6px}
  .hv{font-size:.7rem}.hl{font-size:.38rem}.hln{font-size:.5rem}
  .gbw{height:4px;margin-bottom:.05rem}.gbr{margin-top:.05rem}
  .obj-bar{font-size:.48rem;margin-bottom:.05rem}
  .bw{padding:2px;border-radius:10px}
  .logo{margin-bottom:.3rem}.sub{margin-bottom:.6rem;font-size:.65rem}
  .tbtns{gap:.4rem}.bp{padding:.65rem 2rem}.bs{padding:.4rem 1rem;font-size:.65rem}
  .lhdr{font-size:1rem}.map-wrap{height:48dvh}
  .ob{padding:.8rem}.ot{font-size:1.1rem}.os{font-size:.85rem}.om{font-size:.65rem;margin-bottom:.5rem}
  .obt .btn{font-size:.6rem;padding:.35rem .8rem}
}
/* Very short phones / landscape-ish */
@media(max-height:580px){
  .pu{width:28px;height:28px;font-size:.75rem}.puc{width:13px;height:13px;font-size:.38rem;top:-2px;right:-2px}
  .hv{font-size:.6rem}.hp{padding:.1rem .2rem}
  .pub{gap:.15rem;margin-top:.05rem;padding:0}
  .bbg{font-size:.5rem;padding:.2rem .4rem}
  .logo{font-size:1.5rem}.sub{font-size:.55rem;margin-bottom:.4rem}
  .map-wrap{height:42dvh}
}
/* Narrow phones (< 360px width) */
@media(max-width:360px){
  .bp{padding:.7rem 1.8rem;font-size:.8rem}.bs{padding:.4rem 1rem;font-size:.65rem}
  .trow{gap:.3rem}.hud{gap:2px}
  .shop-grid{grid-template-columns:repeat(2,1fr)}
  .stat-grid{grid-template-columns:1fr}
}
/* Wide phones in landscape */
@media(orientation:landscape) and (max-height:500px){
  .logo{font-size:1.3rem}.sub{display:none}.tbtns{gap:.3rem;flex-direction:row;flex-wrap:wrap;justify-content:center}
  .map-wrap{height:55dvh;width:min(60vw,400px)}
  .hud{max-width:min(70vw,450px)}.pub{max-width:min(70vw,450px)}
  .gbw{max-width:min(70vw,450px)}.gbr{max-width:min(70vw,450px)}
  .obj-bar{max-width:min(70vw,450px)}
}
</style>
</head>
<body>
<div id="gc">
<canvas id="sf"></canvas>

<!-- TITLE -->
<div id="ts" class="screen active">
  <div class="logo">COSMIC COMBO</div>
  <div class="sub">Match · Combo · Conquer</div>
  <div class="tbtns">
    <button class="btn bp" onclick="G.showLevels()">▶ PLAY</button>
    <div class="trow">
      <button class="btn bs" onclick="G.cont()">CONTINUE</button>
      <button class="btn bs" onclick="G.showShop()">🛒 SHOP</button>
    </div>
    <div class="trow">
      <button class="btn bs" onclick="G.showSpin()">🎰 SPIN</button>
      <button class="btn bs" onclick="G.showStats()">📊 STATS</button>
      <button class="btn bs" onclick="G.showThemes()">🎨</button>
    </div>
    <div class="trow">
      <button class="btn btn-share" onclick="G.shareInvite()" style="font-size:.65rem;padding:.35rem 1rem">📤 INVITE FRIENDS</button>
      <button class="btn bs" id="music-btn" onclick="SFX.toggleMusic()" style="font-size:.6rem;padding:.35rem .8rem">🎵 ON</button>
    </div>
  </div>
  <div class="tstats" id="tst"></div>
</div>

<!-- LEVEL MAP -->
<div id="ls" class="screen">
  <button class="btn bs lbb" onclick="G.showTitle()">← BACK</button>
  <div class="lcoins" id="lcoins"></div>
  <div class="lhdr">SELECT LEVEL</div>
  <div class="lzone" id="zn"></div>
  <div class="map-wrap" id="map-wrap"><canvas id="mapCanvas"></canvas></div>
  <div class="lnav">
    <button class="btn bs" id="lpv" onclick="G.lpv()" style="display:none">▲</button>
    <div class="lpi" id="lpi"></div>
    <button class="btn bs" id="lnx" onclick="G.lnx()" style="display:none">▼</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop-screen" class="screen">
  <button class="btn bs lbb" onclick="G.showTitle()">← BACK</button>
  <div class="lhdr">🛒 COSMIC SHOP</div>
  <div class="lzone" id="shop-coins"></div>
  <div class="shop-grid" id="shop-grid"></div>
  <button class="btn bs" onclick="G.showTitle()" style="margin-top:.4rem">DONE</button>
</div>

<!-- SPIN -->
<div id="spin-screen" class="screen">
  <button class="btn bs lbb" onclick="G.showTitle()">← BACK</button>
  <div class="lhdr" style="font-family:'Audiowide',cursive">🎰 LUCKY SPIN</div>
  <div class="lzone" id="spin-status"></div>
  <div class="spin-area">
    <div style="position:relative;display:inline-block">
      <div class="spin-pointer">▼</div>
      <div id="spinWheelWrap" style="width:220px;height:220px;position:relative">
        <canvas id="spinWheel" width="440" height="440" style="width:220px;height:220px;border-radius:50%;border:3px solid var(--gold);transition:transform 4s cubic-bezier(.17,.67,.08,.99)"></canvas>
      </div>
    </div>
    <div class="spin-result" id="spin-result"></div>
    <button class="btn bp" id="spin-btn" onclick="G.doSpin()" style="font-size:.85rem;padding:.7rem 2.5rem">🎰 SPIN FREE!</button>
  </div>
</div>

<!-- STATS & ACHIEVEMENTS -->
<div id="stats-screen" class="screen">
  <button class="btn bs lbb" onclick="G.showTitle()">← BACK</button>
  <div class="lhdr">📊 STATS</div>
  <div class="lzone">YOUR COSMIC JOURNEY</div>
  <div class="stat-grid" id="stat-grid"></div>
  <div class="lhdr" style="margin-top:.5rem;font-size:1rem">🏅 ACHIEVEMENTS</div>
  <div class="ach-grid" id="ach-grid"></div>
  <div class="lhdr" style="margin-top:.5rem;font-size:1rem">🌈 STREAK</div>
  <div class="streak-bar" id="streak-bar"></div>
  <div class="obt" style="margin-top:.5rem">
    <button class="btn btn-share" onclick="G.shareStats()" style="font-size:.65rem;padding:.4rem 1.2rem">📤 SHARE MY STATS</button>
    <button class="btn bs" onclick="G.showTitle()">DONE</button>
  </div>
</div>

<!-- THEMES -->
<div id="themes-screen" class="screen">
  <button class="btn bs lbb" onclick="G.showTitle()">← BACK</button>
  <div class="lhdr">🎨 THEMES</div>
  <div class="lzone">UNLOCK WITH COINS</div>
  <div class="theme-grid" id="theme-grid"></div>
  <button class="btn bs" onclick="G.showTitle()" style="margin-top:.5rem">DONE</button>
</div>

<!-- GAME -->
<div id="gs" class="screen">
  <div class="hud">
    <div class="hp"><div class="hl">Score</div><div class="hv" id="hsc">0</div></div>
    <div class="hp hli"><div class="hln" id="hln">Level 1</div><div class="hm">Moves: <span class="hmc" id="hmv">30</span></div></div>
    <div class="hp" style="text-align:right"><div class="hl">Goal</div><div class="hv" id="hgl">10000</div><div class="hlv" id="hlv"></div></div>
  </div>
  <div class="timer-bar" id="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
  <div class="obj-bar" id="obj-bar" style="display:none">
    <span class="obj-icon" id="obj-icon"></span>
    <span>Collect: <span class="obj-text" id="obj-text"></span></span>
    <span class="coin-hud" id="coin-hud">🪙 0</span>
  </div>
  <div class="gbw"><div class="gbf" id="gbf"></div></div>
  <div class="bw"><canvas id="cv"></canvas><canvas id="explCanvas"></canvas></div>
  <div class="pub" id="pub"></div>
  <div class="gbr">
    <button class="btn bs bbg" onclick="G.back()">☰</button>
    <button class="btn bs bbg" onclick="G.shuffle()">🔀</button>
  </div>
</div>

<!-- WIN -->
<div id="wo" class="ov"><div class="ob">
  <div class="ot w">★ STELLAR! ★</div>
  <div class="win-stars" id="win-stars"></div>
  <div class="os" id="wsc"></div>
  <div class="win-coins" id="win-coins"></div>
  <div class="om" id="wmsg"></div>
  <div class="share-card" id="share-card" style="display:none"></div>

// ===== LEVEL GENERATION =====
function genLevel(n){
  const isBoss=n>=8&&n%8===0;const bossCount=Math.floor(n/8);const d=Math.min(n/2000,1);
  let moves,goal,numTypes,frozenCount=0,objective=null,blockerCount=0,hasMorphing=false,hasTimeWarp=false,
      lavaRate=0,diamondChance=0,mysteryBoxCount=0,magnetChance=0;

  if(isBoss){
    goal=Math.round((22000+bossCount*8000+Math.pow(bossCount,1.6)*3000)/1000)*1000;
    moves=Math.max(10,Math.round(18-bossCount*0.5));numTypes=n>200?6:n>80?5:4;
    frozenCount=Math.min(12,2+bossCount);blockerCount=Math.min(4,Math.floor(bossCount/3));
    hasMorphing=bossCount>=3;hasTimeWarp=bossCount>=5;
    lavaRate=bossCount>=4?Math.min(8,3+bossCount):0;
    diamondChance=0.02;mysteryBoxCount=1;magnetChance=0.03;
    const oidx=Math.floor(Math.random()*numTypes);
    objective={type:'collect',tileType:TT[oidx],target:Math.min(40,10+bossCount*2),current:0};
  }else{
    const base=10000,scaling=n*300+Math.pow(n,1.35)*20;
    goal=Math.round((base+scaling)/500)*500;
    moves=Math.max(15,Math.round(32-d*17));numTypes=n>200?6:n>50?5:4;
    if(n>10)frozenCount=Math.min(8,Math.floor((n-10)/8));
    if(n>20)blockerCount=Math.min(3,Math.floor((n-20)/15));
    if(n>30)hasMorphing=n%7===0;
    if(n>40)hasTimeWarp=n%12===0;
    if(n>15)lavaRate=n%10===0?Math.min(5,Math.floor(n/30)):0;
    diamondChance=n>5?0.015:0;
    mysteryBoxCount=n%8===4?Math.min(3,1+Math.floor(n/50)):0;
    magnetChance=n>25?0.02:0;
    if(n%5===0&&n>3){const oidx=Math.floor(Math.random()*numTypes);
      objective={type:'collect',tileType:TT[oidx],target:Math.min(30,8+Math.floor(n/10)),current:0};}
    if(n%25===0)moves+=5;
  }
  const z=Math.floor((n-1)/200);
  return{level:n,moves,goal,numTypes,frozenCount,objective,isBoss,blockerCount,hasMorphing,hasTimeWarp,
    lavaRate,diamondChance,mysteryBoxCount,magnetChance,zone:ZONES[z%ZONES.length]||"Deep Space"};
}

// ===== SFX ENGINE =====
const SFX={ctx:null,musicOn:true,musicNodes:null,masterGain:null,musicGain:null,sfxGain:null,
  init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();
    this.masterGain=this.ctx.createGain();this.masterGain.gain.value=1;this.masterGain.connect(this.ctx.destination);
    this.sfxGain=this.ctx.createGain();this.sfxGain.gain.value=1;this.sfxGain.connect(this.masterGain);
    this.musicGain=this.ctx.createGain();this.musicGain.gain.value=0.3;this.musicGain.connect(this.masterGain);}catch(e){}},
  resume(){if(this.ctx?.state==='suspended')this.ctx.resume()},
  startMusic(){if(!this.ctx||!this.musicOn||this.musicNodes)return;this.resume();const c=this.ctx,mg=this.musicGain;
    const d1=c.createOscillator();d1.type='sine';d1.frequency.value=55;const dg=c.createGain();dg.gain.value=0.25;d1.connect(dg);dg.connect(mg);d1.start();
    const d2=c.createOscillator();d2.type='sine';d2.frequency.value=82.5;const dg2=c.createGain();dg2.gain.value=0.12;d2.connect(dg2);dg2.connect(mg);d2.start();
    const pads=[130.81,164.81,196,261.63].map(f=>{const o=c.createOscillator();o.type='sine';o.frequency.value=f;const g=c.createGain();g.gain.value=0.035;
      const lfo=c.createOscillator();lfo.type='sine';lfo.frequency.value=0.12+Math.random()*0.1;const lg=c.createGain();lg.gain.value=0.025;
      lfo.connect(lg);lg.connect(g.gain);o.connect(g);g.connect(mg);o.start();lfo.start();return{o,g,lfo}});
    const n=c.createBufferSource();const buf=c.createBuffer(1,c.sampleRate*4,c.sampleRate);const nd=buf.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
    n.buffer=buf;n.loop=true;const nf=c.createBiquadFilter();nf.type='bandpass';nf.frequency.value=300;nf.Q.value=2;
    const nl=c.createOscillator();nl.type='sine';nl.frequency.value=0.05;const nlg=c.createGain();nlg.gain.value=200;nl.connect(nlg);nlg.connect(nf.frequency);
    const ng=c.createGain();ng.gain.value=0.05;n.connect(nf);nf.connect(ng);ng.connect(mg);n.start();nl.start();
    const arpN=[196,233.08,261.63,293.66,349.23,392,466.16,523.25];
    const arpI=setInterval(()=>{if(!this.musicOn)return;const note=arpN[Math.floor(Math.random()*arpN.length)];
      const o=c.createOscillator();o.type='sine';const g=c.createGain();const now=c.currentTime;
      o.frequency.setValueAtTime(note,now);g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0.05,now+0.3);g.gain.linearRampToValueAtTime(0,now+2);
      o.connect(g);g.connect(mg);o.start(now);o.stop(now+2.5);},2500+Math.random()*2500);
    this.musicNodes={d1,d2,dg,dg2,pads,n,nf,nl,ng,arpI};},
  stopMusic(){if(!this.musicNodes)return;const n=this.musicNodes;
    try{n.d1.stop();n.d2.stop();n.n.stop();n.nl.stop();n.pads.forEach(p=>{p.o.stop();p.lfo.stop()});clearInterval(n.arpI);}catch(e){}
    this.musicNodes=null;},
  toggleMusic(){this.musicOn=!this.musicOn;document.getElementById('music-btn').textContent=`🎵 ${this.musicOn?'ON':'OFF'}`;
    if(this.musicOn)this.startMusic();else this.stopMusic();},
  play(type){if(!this.ctx)return;this.resume();const c=this.ctx,now=c.currentTime,dest=this.sfxGain;
    if(type==='explode'){const nb=c.createBuffer(1,c.sampleRate*1.5,c.sampleRate);const nd=nb.getChannelData(0);for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*.25));
      const ns=c.createBufferSource();ns.buffer=nb;const nf=c.createBiquadFilter();nf.type='lowpass';nf.frequency.setValueAtTime(3000,now);nf.frequency.exponentialRampToValueAtTime(100,now+1);
      const ng=c.createGain();ng.gain.setValueAtTime(.35,now);ng.gain.exponentialRampToValueAtTime(.001,now+1.2);ns.connect(nf);nf.connect(ng);ng.connect(dest);ns.start(now);
      const so=c.createOscillator();so.type='sine';so.frequency.setValueAtTime(60,now);so.frequency.exponentialRampToValueAtTime(20,now+1);
      const sg=c.createGain();sg.gain.setValueAtTime(.3,now);sg.gain.exponentialRampToValueAtTime(.001,now+1.2);so.connect(sg);sg.connect(dest);so.start(now);so.stop(now+1.3);return;}
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(dest);
    switch(type){

      case'combo':o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(1200,now+.18);g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.start(now);o.stop(now+.2);break;
      case'swap':o.type='triangle';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(500,now+.05);g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.07);o.start(now);o.stop(now+.07);break;
      case'fail':o.type='sawtooth';o.frequency.setValueAtTime(300,now);o.frequency.exponentialRampToValueAtTime(100,now+.25);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);o.start(now);o.stop(now+.3);break;
      case'win':[0,.08,.16,.24,.32].forEach((d,i)=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(dest);o2.type='sine';o2.frequency.setValueAtTime([523,659,784,1047,1318][i],now+d);g2.gain.setValueAtTime(.1,now+d);g2.gain.exponentialRampToValueAtTime(.001,now+d+.25);o2.start(now+d);o2.stop(now+d+.25)});o.frequency.setValueAtTime(20,now);g.gain.setValueAtTime(0,now);o.start(now);o.stop(now+.01);break;
      case'ice':o.type='sine';o.frequency.setValueAtTime(2000,now);o.frequency.exponentialRampToValueAtTime(800,now+.1);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.12);o.start(now);o.stop(now+.12);break;
      case'coin':o.type='sine';o.frequency.setValueAtTime(1200,now);o.frequency.setValueAtTime(1600,now+.04);g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.1);break;
      case'powerup':o.type='sine';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(1600,now+.12);g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break;
      case'zap':o.type='sawtooth';o.frequency.setValueAtTime(1800,now);o.frequency.exponentialRampToValueAtTime(200,now+.07);g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.09);o.start(now);o.stop(now+.09);break;
      case'blackhole':o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(20,now+1.2);g.gain.setValueAtTime(.18,now);g.gain.exponentialRampToValueAtTime(.001,now+1.3);o.start(now);o.stop(now+1.4);break;
      case'diamond':o.type='sine';o.frequency.setValueAtTime(1000,now);o.frequency.setValueAtTime(1500,now+.05);o.frequency.setValueAtTime(2000,now+.1);g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.2);o.start(now);o.stop(now+.2);break;
      case'mystery':o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.setValueAtTime(1200,now+.08);o.frequency.setValueAtTime(600,now+.16);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);o.start(now);o.stop(now+.25);break;
      case'lava':o.type='sawtooth';o.frequency.setValueAtTime(80,now);o.frequency.exponentialRampToValueAtTime(40,now+.4);g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+.5);o.start(now);o.stop(now+.5);break;
      case'spin':o.type='sine';o.frequency.setValueAtTime(300,now);for(let i=0;i<20;i++)o.frequency.setValueAtTime(300+i*50,now+i*.15);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+3);o.start(now);o.stop(now+3);break;
      default:o.frequency.setValueAtTime(20,now);g.gain.setValueAtTime(0,now);o.start(now);o.stop(now+.01);}}};

const SF={c:null,x:null,s:[],init(){this.c=document.getElementById('sf');this.x=this.c.getContext('2d');this.rs();window.addEventListener('resize',()=>this.rs());this.s=[];for(let i=0;i<130;i++)this.s.push({x:Math.random()*this.c.width,y:Math.random()*this.c.height,r:Math.random()*1.5+.3,sp:Math.random()*.25+.04,a:Math.random()*.8+.2,tw:Math.random()*Math.PI*2})},rs(){this.c.width=innerWidth;this.c.height=innerHeight},draw(){const x=this.x;x.clearRect(0,0,this.c.width,this.c.height);const t=Date.now()*.001;for(const s of this.s){s.y+=s.sp;if(s.y>this.c.height){s.y=0;s.x=Math.random()*this.c.width}x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fillStyle=`rgba(200,220,255,${s.a*(.6+.4*Math.sin(t*2+s.tw))})`;x.fill()}}};

const B={g:[],cs:0,sel:null,tid:0,cfg:null,at:[],frozen:[],blocker:[],diamond:[],mystery:[],morphing:[],magnet:[],lava:[],morphCounter:0,
  init(cfg){this.cfg=cfg;this.at=TT.slice(0,cfg.numTypes);this.sel=null;this.tid=0;this.morphCounter=0;
    this.g=[];this.frozen=[];this.blocker=[];this.diamond=[];this.mystery=[];this.morphing=[];this.magnet=[];this.lava=[];
    for(let r=0;r<ROW;r++){this.g[r]=[];this.frozen[r]=[];this.blocker[r]=[];this.diamond[r]=[];this.mystery[r]=[];this.morphing[r]=[];this.magnet[r]=[];this.lava[r]=[];
      for(let c=0;c<COL;c++){this.g[r][c]=this.rt(r,c);this.frozen[r][c]=0;this.blocker[r][c]=false;this.diamond[r][c]=false;this.mystery[r][c]=false;this.morphing[r][c]=false;this.magnet[r][c]=false;this.lava[r][c]=false;}}
    let sf=0;while(this.fm().length>0&&sf<100){for(const m of this.fm())for(const[r,c]of m.cells)this.g[r][c]=this.rt(r,c);sf++}
    // Place special cells
    const avail=[];for(let r=0;r<ROW;r++)for(let c=0;c<COL;c++)avail.push([r,c]);
    for(let i=avail.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[avail[i],avail[j]]=[avail[j],avail[i]]}
    let idx=0;
    // Blockers
    for(let i=0;i<Math.min(cfg.blockerCount||0,avail.length-idx);i++){const[r,c]=avail[idx++];this.blocker[r][c]=true;this.g[r][c]=null;}
    // Frozen
    const fLayers=cfg.isBoss?2:1;
    for(let i=0;i<Math.min(cfg.frozenCount||0,avail.length-idx);i++){const[r,c]=avail[idx++];if(!this.blocker[r][c])this.frozen[r][c]=fLayers;}
    // Mystery boxes
    for(let i=0;i<Math.min(cfg.mysteryBoxCount||0,avail.length-idx);i++){const[r,c]=avail[idx++];if(!this.blocker[r][c])this.mystery[r][c]=true;}
    // Diamonds, morphing, magnets (random chance per cell)
    for(let r=0;r<ROW;r++)for(let c=0;c<COL;c++){if(this.blocker[r][c])continue;
      if(Math.random()<(cfg.diamondChance||0))this.diamond[r][c]=true;
      if(cfg.hasMorphing&&Math.random()<0.08)this.morphing[r][c]=true;
      if(Math.random()<(cfg.magnetChance||0))this.magnet[r][c]=true;}
    // Lava
    if(cfg.lavaRate>0){for(let c=0;c<COL;c++)this.lava[ROW-1][c]=true;}

  rt(r,c){let t,tries=0;do{t=this.at[Math.floor(Math.random()*this.at.length)];tries++}while(tries<20&&this.wm(r,c,t));return{type:t,sp:SP.NONE,id:++this.tid}},
  wm(r,c,t){if(c>=2&&this.g[r]?.[c-1]?.type===t&&this.g[r]?.[c-2]?.type===t)return true;if(r>=2&&this.g[r-1]?.[c]?.type===t&&this.g[r-2]?.[c]?.type===t)return true;return false},
  fm(){const m=[];for(let r=0;r<ROW;r++){for(let c=0;c<=COL-3;c++){if(!this.g[r][c]||this.blocker[r][c])continue;const t=this.g[r][c].type;let l=1;while(c+l<COL&&this.g[r][c+l]?.type===t&&!this.blocker[r][c+l])l++;if(l>=3){const cells=[];for(let i=0;i<l;i++)cells.push([r,c+i]);m.push({cells,dir:'h',len:l});c+=l-1}}}for(let c=0;c<COL;c++){for(let r=0;r<=ROW-3;r++){if(!this.g[r][c]||this.blocker[r][c])continue;const t=this.g[r][c].type;let l=1;while(r+l<ROW&&this.g[r+l]?.[c]?.type===t&&!this.blocker[r+l][c])l++;if(l>=3){const cells=[];for(let i=0;i<l;i++)cells.push([r+i,c]);m.push({cells,dir:'v',len:l});r+=l-1}}}return m},

  // ===== LUCKY SPIN =====
  showSpin(){this.st='spin';this.ss('spin-screen');this.renderSpin()},
  spinItems:[{label:'💥 x2',key:'bomb2'},{label:'⚡ x2',key:'line2'},{label:'🌀 x1',key:'cosmic1'},{label:'🪙 50',key:'coin50'},
    {label:'🪙 100',key:'coin100'},{label:'🪙 200',key:'coin200'},{label:'❤️ x1',key:'life1'},{label:'🕳️ x1',key:'bh1'}],
  spinAngle:0,spinning:false,
  renderSpin(){const today=new Date().toDateString();const canSpin=this.lastSpinDate!==today;
    document.getElementById('spin-status').textContent=canSpin?'✨ FREE DAILY SPIN AVAILABLE!':'Come back tomorrow for another spin!';
    const btn=document.getElementById('spin-btn');
    btn.style.display=canSpin?'inline-block':'none';
    btn.disabled=false;
    document.getElementById('spin-result').textContent='';
    // Draw high-res wheel on canvas
    const cv=document.getElementById('spinWheel');const ctx=cv.getContext('2d');
    const W=440,cx=W/2,cy=W/2,r=W/2-10;
    ctx.clearRect(0,0,W,W);
    const items=this.spinItems;const seg=Math.PI*2/items.length;
    const colors=['#ff2255','#ff9900','#22dd66','#0099ff','#cc33ff','#ffcc00','#00cccc','#8844ff'];
    // Draw segments
    items.forEach((item,i)=>{
      ctx.save();
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,seg*i-Math.PI/2,seg*(i+1)-Math.PI/2);ctx.closePath();
      // Gradient fill
      const midAngle=seg*i+seg/2-Math.PI/2;
      const gx=cx+Math.cos(midAngle)*r*.5,gy=cy+Math.sin(midAngle)*r*.5;
      const g=ctx.createRadialGradient(cx,cy,r*.1,cx,cy,r);
      g.addColorStop(0,colors[i]+'55');g.addColorStop(.7,colors[i]+'33');g.addColorStop(1,colors[i]+'11');
      ctx.fillStyle=g;ctx.fill();
      // Segment border
      ctx.strokeStyle=colors[i]+'88';ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
    });
    // Draw labels
    items.forEach((item,i)=>{
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate(seg*i+seg/2-Math.PI/2);
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.font='bold 28px Rajdhani';ctx.fillStyle='#fff';
      ctx.shadowColor=colors[i];ctx.shadowBlur=6;
      ctx.fillText(item.label,0,-r*.62);
      ctx.restore();
    });
    // Center circle
    const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,30);
    cg.addColorStop(0,'#ffcc00');cg.addColorStop(.7,'#ff8800');cg.addColorStop(1,'#cc4400');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,25,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,25,0,Math.PI*2);ctx.stroke();
    ctx.font='bold 18px Rajdhani';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText('SPIN',cx,cy);
    // Reset rotation
    cv.style.transform=`rotate(${this.spinAngle}deg)`;
  },
  doSpin(){
    const today=new Date().toDateString();if(this.lastSpinDate===today||this.spinning)return;
    this.spinning=true;this.lastSpinDate=today;SFX.play('spin');
    document.getElementById('spin-btn').disabled=true;
    document.getElementById('spin-result').textContent='';
    
    const items=this.spinItems;const idx=Math.floor(Math.random()*items.length);
    const seg=360/items.length;
    // Calculate target angle: land on the winning segment
    // The pointer is at top (0°), segments start from top going clockwise
    // We need the winning segment's center to align with the top
    const targetSegCenter=seg*idx+seg/2;
    const extraSpins=5+Math.floor(Math.random()*3); // 5-7 full rotations
    const targetAngle=extraSpins*360+(360-targetSegCenter);
    this.spinAngle+=targetAngle;
    
    const cv=document.getElementById('spinWheel');
    cv.style.transform=`rotate(${this.spinAngle}deg)`;
    
    // Award after animation completes
    setTimeout(()=>{
      this.spinning=false;
      const item=items[idx];
      // Award
      if(item.key==='bomb2')this.pups.bomb+=2;
      else if(item.key==='line2')this.pups.rowcol+=2;

  rlg(){const total=this.hlv;const tp=Math.max(1,Math.ceil(total/this.lpp));if(this.lp>=tp)this.lp=tp-1;if(this.lp<0)this.lp=0;
    const start=this.lp*this.lpp+1,end=Math.min(start+this.lpp-1,total);const z=Math.floor((start-1)/200);
    document.getElementById('zn').textContent=`Zone ${z+1}: ${ZONES[z%ZONES.length]||"Deep Space"}`;
    document.getElementById('lcoins').textContent=`🪙 ${this.coins}`;document.getElementById('lpi').textContent=`${this.lp+1} / ${tp}`;
    document.getElementById('lpv').style.display=this.lp>0?'':'none';document.getElementById('lnx').style.display=this.lp<tp-1?'':'none';
    const wrap=document.getElementById('map-wrap');const oldCv=document.getElementById('mapCanvas');const cv=oldCv.cloneNode(true);oldCv.parentNode.replaceChild(cv,oldCv);
    const dpr=devicePixelRatio||1;const w=wrap.clientWidth,h=wrap.clientHeight;cv.width=w*dpr;cv.height=h*dpr;cv.style.width=w+'px';cv.style.height=h+'px';

    const curIdx=Math.min(this.hlv-start,positions.length-1);if(curIdx>=0&&positions[curIdx])this.mapScroll=Math.max(0,Math.min(maxScroll,positions[curIdx].y-h/2));

  drawMap(cv,w,h,dpr,positions,startLevel){const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);const scroll=this.mapScroll,t=Date.now()*.001;

      for(let i=1;i<positions.length;i++){const p0=positions[i-1],p1=positions[i];const lv=startLevel+i;const completed=lv<=this.hlv;ctx.strokeStyle=completed?'rgba(0,230,255,0.5)':'rgba(60,60,100,0.25)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(p0.x,p0.y-scroll);ctx.lineTo(p1.x,p1.y-scroll);ctx.stroke()}}
    // Nodes (works with 1+ nodes)
    for(let i=0;i<positions.length;i++){const p=positions[i];const lv=startLevel+i;const sy=p.y-scroll;if(sy<-30||sy>h+30)continue;
      const cfg=genLevel(lv);const isDone=lv<this.hlv;const isCur=lv===this.hlv;const isBoss=cfg.isBoss;const stars=this.stars[lv]||0;
      const radius=isBoss?17:14;ctx.save();
      if(isCur){const pulse=.5+.3*Math.sin(t*3);const cg=ctx.createRadialGradient(p.x,sy,0,p.x,sy,28);cg.addColorStop(0,`rgba(0,230,255,${.3*pulse})`);cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(p.x,sy,28,0,Math.PI*2);ctx.fill()}
      const ng=ctx.createRadialGradient(p.x-2,sy-2,0,p.x,sy,radius);
      if(isDone){ng.addColorStop(0,'#66ffaa');ng.addColorStop(1,'#1a6b3a')}else if(isCur){ng.addColorStop(0,'#66ddff');ng.addColorStop(1,'#0a5580')}
      else{ng.addColorStop(0,'#555577');ng.addColorStop(1,'#222233')}
      ctx.fillStyle=ng;ctx.beginPath();ctx.arc(p.x,sy,radius,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=isBoss?'rgba(255,68,102,0.8)':isDone?'rgba(68,255,136,0.5)':isCur?'rgba(0,230,255,0.6)':'rgba(80,80,120,0.25)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,sy,radius,0,Math.PI*2);ctx.stroke();
      ctx.font=`bold ${isBoss?9:8}px Audiowide`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=isDone||isCur?'#fff':'rgba(150,150,180,0.4)';ctx.fillText(lv,p.x,sy-(isDone?1:0));

      if(isCur){const bounce=Math.sin(t*4)*2;ctx.font='bold 8px Audiowide';ctx.fillStyle='#00e5ff';ctx.fillText('▶ PLAY',p.x,sy+radius+12+bounce)}
      ctx.restore()}},

  async upu(r,c){if(!this.apu||this.pups[this.apu]<=0)return;const k=this.apu;this.pups[k]--;this.apu=null;this.st='animating';

    const m=B.fm();
    if(m.length===0){SFX.play('fail');RR.anims.push({tid:t1.id,type:'swap',p:0,d:.15,fx:c2*cs,fy:r2*cs,tx:c1*cs,ty:r1*cs,cx:c2*cs,cy:r2*cs});RR.anims.push({tid:t2.id,type:'swap',p:0,d:.15,fx:c1*cs,fy:r1*cs,tx:c2*cs,ty:r2*cs,cx:c1*cs,cy:r1*cs});await this.w(170);B.sw(r1,c1,r2,c2);this.st='playing';return}
    this.mv--;this.stats.totalMoves++;this.combo=0;this.chainMax=0;B.doMorph();
    // Lava advance
    if(B.cfg?.lavaRate&&this.mv>0){this.lavaMovesCounter++;if(this.lavaMovesCounter%B.cfg.lavaRate===0){if(B.advanceLava()){SFX.play('lava');this.sct('🌊 LAVA RISES!','#ff4400')}}}
    await this.pm(m);await this.cl();this.cwl();if(this.st==='animating')this.st='playing'},

  async pm(matches){this.combo++;if(this.combo>this.chainMax)this.chainMax=this.combo;if(this.chainMax>this.stats.bestChain)this.stats.bestChain=this.chainMax;
    const allC=new Set();let stc=null;
    for(const m of matches){for(const[r,c]of m.cells)allC.add(`${r},${c}`);const sp=B.ds(m,matches);if(sp!==SP.NONE&&(!stc||sp>stc.type)){const mi=Math.floor(m.cells.length/2);stc={type:sp,row:m.cells[mi][0],col:m.cells[mi][1],tt:B.g[m.cells[0][0]][m.cells[0][1]]?.type}}}
    const bp=allC.size*50,cm=1+(this.combo-1)*.5,chainBonus=this.combo>=3?this.combo*100:0;const pts=Math.round(bp*cm)+chainBonus;
    // Time warp bonus
    const twBonus=this.timeWarpActive?Math.round(this.timeWarpRemaining*2):0;
    this.sc+=pts+twBonus;SFX.play(this.combo>1?'combo':'match');if(this.combo>1)this.scp(this.combo,pts+twBonus,this.combo>=3);
    const extraC=new Set();const spSrc=[];for(const k of allC){const[r,c]=k.split(',').map(Number);const tile=B.g[r][c];if(tile&&tile.sp!==SP.NONE){const sc=B.gsc(tile.sp,r,c,tile.type);for(const s of sc)extraC.add(s);spSrc.push({r,c,sp:tile.sp})}}
    if(stc)allC.delete(`${stc.row},${stc.col}`);
    for(const k of allC){const[r,c]=k.split(',').map(Number);if(!B.g[r][c])continue;
      if(this.objective&&B.g[r][c].type===this.objective.tileType)this.objective.current++;
      if(B.diamond[r][c]){this.sc+=allC.size*200;SFX.play('diamond');this.stats.diamondsMatched++;B.diamond[r][c]=false}
      if(B.mystery[r][c]){SFX.play('mystery');this.coins+=25;B.mystery[r][c]=false}
      for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROW&&nc>=0&&nc<COL&&B.frozen[nr][nc]>0){B.frozen[nr][nc]--;if(B.frozen[nr][nc]===0)SFX.play('ice')}}
      this.stats.totalMatches++;
      RR.addP(r,c,PCOL[B.g[r][c].type]||'#fff',7);RR.anims.push({tid:B.g[r][c].id,type:'clear',p:0,d:.2,sc:1,al:1})}
    await this.w(220);for(const k of allC){const[r,c]=k.split(',').map(Number);B.g[r][c]=null}
    if(stc){if(!B.g[stc.row][stc.col])B.g[stc.row][stc.col]={type:stc.tt,sp:stc.type,id:++B.tid};else B.g[stc.row][stc.col].sp=stc.type;RR.anims.push({tid:B.g[stc.row][stc.col].id,type:'spawn',p:0,d:.3,sc:0})}
    if(extraC.size>0){const extra=[];for(const k of extraC){if(allC.has(k))continue;const[r,c]=k.split(',').map(Number);if(B.g[r][c])extra.push([r,c])}
      for(const src of spSrc){const tgts=extra.slice(0,20);if(tgts.length>0)RR.addLightningBurst(src.r,src.c,tgts,src.sp>=SP.COSMIC?'#ffdd00':'#00eeff',2)}
      if(extra.length>0)await this.cc(extra,30)}
    this.uh()},

  async cl(){let go=true;while(go){const drops=B.ag();if(drops.length>0){const cs=B.cs;for(const d of drops)RR.anims.push({tid:d.tile.id,type:'drop',p:0,d:.15+Math.abs(d.tr-d.fr)*.03,fy:d.fr*cs,ty:d.tr*cs,cy:d.fr*cs});await this.w(160+drops.length*5)}const m=B.fm();if(m.length>0)await this.pm(m);else go=false}if(!B.hvm()){B.shuf();this.sct('SHUFFLE!','#00e5ff');await this.w(350)}},

  cwl(){if(this.sc>this.stats.bestScore)this.stats.bestScore=this.sc;
    const objMet=!this.objective||this.objective.current>=this.objective.target;
    // Check lava game over
    let lavaGameOver=false;for(let c=0;c<COL;c++)if(B.lava[0]?.[c])lavaGameOver=true;
    if(lavaGameOver){this.st='lose';SFX.play('fail');this.lives=Math.max(0,this.lives-1);this.save();
      setTimeout(()=>{document.getElementById('lsc').textContent=`${this.sc.toLocaleString()} / ${this.gl.toLocaleString()}`;document.getElementById('lmsg').textContent='🌊 Lava reached the top!';document.getElementById('lo').classList.add('active')},400);return}
    if(this.sc>=this.gl&&objMet){
      this.st='win';SFX.play('win');
      const mvPct=this.mv/(this.cfg?.moves||30);const starCount=mvPct>.6?3:mvPct>.3?2:1;
      const prev=this.stars[this.lv]||0;if(starCount>prev)this.stars[this.lv]=starCount;
      const coinEarned=50+starCount*25+(this.chainMax>=3?this.chainMax*20:0)+(this.cfg?.isBoss?100:0);
      this.coins+=coinEarned;this.stats.totalCoins+=coinEarned;
      if(this.cfg?.isBoss)this.stats.bossWins++;
      if(this.lv>=this.hlv){this.hlv=this.lv+1;if(this.lv%5===0){this.pups.bomb++;this.pups.rowcol++}if(this.lv%20===0)this.pups.cosmic++;if(this.cfg?.isBoss)this.pups.blackhole++}
      const prev2=this.leaderboard[this.lv]||[];prev2.push(this.sc);prev2.sort((a,b)=>b-a);this.leaderboard[this.lv]=prev2.slice(0,5);
      this.checkAchievements();this.save();
      SFX.play('explode');Explode.trigger();RR.ctx.clearRect(0,0,B.cs*COL,B.cs*ROW);
      setTimeout(()=>{document.getElementById('wsc').textContent=`Score: ${this.sc.toLocaleString()}`;
        document.getElementById('win-stars').textContent='⭐'.repeat(starCount)+'☆'.repeat(3-starCount);
        document.getElementById('win-coins').textContent=`+${coinEarned} 🪙`;
        document.getElementById('wmsg').innerHTML=`Level ${this.lv} cleared!`+(this.chainMax>=3?` 🔗 Chain: ${this.chainMax}x`:'');
        document.getElementById('wo').classList.add('active')},1100)}
    else if(this.mv<=0&&!this.timeWarpActive){this.st='lose';SFX.play('fail');this.lives=Math.max(0,this.lives-1);this.save();
      setTimeout(()=>{document.getElementById('lsc').textContent=`${this.sc.toLocaleString()} / ${this.gl.toLocaleString()}`;
        document.getElementById('lmsg').textContent=this.lives>0?`${this.lives} lives left.`:'No lives! Visit shop.';
        document.getElementById('lo').classList.add('active')},400)}
    else if(this.mv<=0&&this.timeWarpActive&&this.timeWarpRemaining<=0){this.st='lose';SFX.play('fail');this.lives=Math.max(0,this.lives-1);this.save();
      setTimeout(()=>{document.getElementById('lsc').textContent=`${this.sc.toLocaleString()} / ${this.gl.toLocaleString()}`;document.getElementById('lmsg').textContent='⏳ Time\'s up!';document.getElementById('lo').classList.add('active')},400)}},

  findHint(){for(let r=0;r<ROW;r++)for(let c=0;c<COL;c++){if(B.blocker[r][c]||B.frozen[r][c]>0)continue;
    if(c<COL-1&&!B.blocker[r][c+1]&&B.frozen[r][c+1]===0){B.sw(r,c,r,c+1);if(B.fm().length>0){B.sw(r,c,r,c+1);return{r1:r,c1:c,r2:r,c2:c+1}}B.sw(r,c,r,c+1)}
    if(r<ROW-1&&!B.blocker[r+1][c]&&B.frozen[r+1][c]===0){B.sw(r,c,r+1,c);if(B.fm().length>0){B.sw(r,c,r+1,c);return{r1:r,c1:c,r2:r+1,c2:c}}B.sw(r,c,r+1,c)}}return null},

  next(){document.getElementById('wo').classList.remove('active');this.sl(this.lv+1)},
  retry(){document.getElementById('lo').classList.remove('active');if(this.lives<=0){this.lives=3;this.save()}this.sl(this.lv)},
  back(){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('active'));this.showLevels()},
  shuffle(){if(this.st==='playing'){B.shuf();this.sct('SHUFFLED!','#00e5ff')}},
  scp(combo,pts,isChain){const t=['','','GREAT!','AMAZING!','STELLAR!','COSMIC!','SUPERNOVA!','LEGENDARY!'];const c=['','','#39ff80','#00e5ff','#ff3ec9','#ffcc00','#ff3355','#fff'];
    let text=`${t[Math.min(combo,t.length-1)]||'LEGENDARY!'} x${combo}\n+${pts}`;if(isChain)text+='\n🔗 CHAIN!';this.sct(text,c[Math.min(combo,c.length-1)]||'#fff')},
  sct(text,color){const p=document.createElement('div');p.className='cp';p.style.color=color;p.style.left='50%';p.style.top='35%';p.style.transform='translateX(-50%)';p.textContent=text;document.getElementById('gc').appendChild(p);setTimeout(()=>p.remove(),1000)},

  // ===== SHARE SYSTEM =====
  generateShareCard(){
    const stars=this.stars[this.lv]||0;
    const starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);
    const isBoss=this.cfg?.isBoss;
    const chain=this.chainMax>=3?`🔗 Chain: ${this.chainMax}x\n`:'';
    const bossTag=isBoss?'👹 BOSS DEFEATED!\n':'';
    // Generate a mini board art from score
    const sc=this.sc;
    const rank=sc>100000?'🏆 LEGENDARY':sc>50000?'💎 DIAMOND':sc>25000?'🔥 BLAZING':sc>10000?'⭐ STELLAR':'✨ NICE';
    
    const card=
`🌌 COSMIC COMBO 🌌
━━━━━━━━━━━━━━━
${bossTag}Level ${this.lv} ${starStr}
Score: ${sc.toLocaleString()} ${rank}
${chain}Moves left: ${this.mv}/${this.cfg?.moves||30}
━━━━━━━━━━━━━━━
🪐☀️🌙⭐💫🌍

Can you beat my score?
▶ Play: https://demoss911.github.io/cosmic-combo/`;
    return card;
  },

  generateStatsCard(){
    const s=this.stats;
    const card=
`🌌 COSMIC COMBO — MY JOURNEY 🌌
━━━━━━━━━━━━━━━━━━━
🚀 Level: ${this.hlv}
🏆 Best Score: ${s.bestScore.toLocaleString()}
⚡ Best Chain: ${s.bestChain}x
👹 Boss Wins: ${s.bossWins}
🎯 Total Matches: ${s.totalMatches.toLocaleString()}
🔥 Login Streak: ${this.streak.current} days
💎 Diamonds: ${s.diamondsMatched}
━━━━━━━━━━━━━━━━━━━
Think you can do better?
▶ Play: https://demoss911.github.io/cosmic-combo/`;
    return card;
  },

  async shareWin(){
    const text=this.generateShareCard();
    // Show preview
    document.getElementById('share-card').style.display='block';
    document.getElementById('share-card').textContent=text;
    document.getElementById('share-copied').textContent='';
    
    // Try Web Share API (mobile native share sheet)
    if(navigator.share){
      try{
        await navigator.share({title:'Cosmic Combo — I crushed it! 🌌',text:text});
        document.getElementById('share-copied').textContent='✅ Shared!';
      }catch(e){
        // User cancelled — fall back to clipboard
        this.copyToClipboard(text);
      }
    }else{
      this.copyToClipboard(text);
    }
  },

  async shareInvite(){
    const text=
`🌌 COSMIC COMBO 🌌
Match-3 puzzle game with 10,000 levels!

💥 Powerups & combos
👹 Boss battles
🕳️ Black holes
⚡ Lightning effects
🎰 Daily rewards

▶ Play FREE: https://demoss911.github.io/cosmic-combo/`;

    if(navigator.share){
      try{await navigator.share({title:'Play Cosmic Combo! 🌌',text:text,url:'https://demoss911.github.io/cosmic-combo/'});
      }catch(e){this.copyToClipboard(text)}
    }else{this.copyToClipboard(text)}
  },

  async shareStats(){
    const text=this.generateStatsCard();
    if(navigator.share){
      try{await navigator.share({title:'My Cosmic Combo Stats 🌌',text:text});
      }catch(e){this.copyToClipboard(text)}
    }else{this.copyToClipboard(text)}
  },

  async copyToClipboard(text){
    try{await navigator.clipboard.writeText(text);
      document.getElementById('share-copied').textContent='✅ Copied to clipboard!';
      this.sct('📋 Copied!','#39ff80');
    }catch(e){
      // Final fallback — select textarea
      const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      document.getElementById('share-copied').textContent='✅ Copied to clipboard!';
      this.sct('📋 Copied!','#39ff80');
    }
  },
  w(ms){return new Promise(r=>setTimeout(r,ms))},

  loop(){const now=performance.now(),dt=Math.min((now-(this.lft||now))/1000,.05);this.lft=now;
    SF.draw();RR.updA(dt);RR.updP(dt);RR.updL(dt);
    if(this.st==='playing'||this.st==='animating')RR.draw();
    if(Explode.active)Explode.update(dt);
    // Time warp countdown
    if(this.st==='playing'&&this.timeWarpActive&&this.timeWarpRemaining>0){this.timeWarpRemaining-=dt;this.uh();if(this.timeWarpRemaining<=0){this.timeWarpRemaining=0;this.cwl()}}
    // Hint
    if(this.st==='playing'){this.hintTimer+=dt;if(this.hintTimer>=this.hintDelay&&!RR.showHint){const h=this.findHint();if(h){RR.hintR=h.r1;RR.hintC=h.c1;RR.hintR2=h.r2;RR.hintC2=h.c2;RR.showHint=true}}}
    // Stats timer
    if(this.st==='playing')this.stats.timePlayed+=dt;
    requestAnimationFrame(()=>this.loop())}};
G.init();
</script>
